<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TN HMIS Wiki</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/x-icon" href="https://avatars.githubusercontent.com/ShankarBUS">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <svg style="display: none;">
        <symbol id="ic-home" viewBox="0 0 16 16">
            <path fill="currentColor"
                d="M7.313 1.262a1 1 0 0 1 1.374 0l4.844 4.579c.3.283.469.678.469 1.09v5.57a1.5 1.5 0 0 1-1.5 1.5h-2A1.5 1.5 0 0 1 9 12.5V10a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v2.5A1.5 1.5 0 0 1 5.5 14h-2A1.5 1.5 0 0 1 2 12.5V6.93c0-.412.17-.807.47-1.09zM8 1.988l-4.844 4.58A.5.5 0 0 0 3 6.93v5.57a.5.5 0 0 0 .5.5h2a.5.5 0 0 0 .5-.5V10a1.5 1.5 0 0 1 1.5-1.5h1A1.5 1.5 0 0 1 10 10v2.5a.5.5 0 0 0 .5.5h2a.5.5 0 0 0 .5-.5V6.93a.5.5 0 0 0-.156-.363z" />
        </symbol>
        <symbol id="ic-github" viewBox="0 0 98 98">
            <path fill="currentColor" fill-rule="evenodd" clip-rule="evenodd"
                d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756 13.993 40.172 33.405 46.69 2.427.49 3.316-1.059 3.316-2.362 0-1.141-.08-5.052-.08-9.127-13.59 2.934-16.42-5.867-16.42-5.867-2.184-5.704-5.42-7.17-5.42-7.17-4.448-3.015.324-3.015.324-3.015 4.934.326 7.523 5.052 7.523 5.052 4.367 7.496 11.404 5.378 14.235 4.074.404-3.178 1.699-5.378 3.074-6.6-10.839-1.141-22.243-5.378-22.243-24.283 0-5.378 1.94-9.778 5.014-13.2-.485-1.222-2.184-6.275.486-13.038 0 0 4.125-1.304 13.426 5.052a46.97 46.97 0 0 1 12.214-1.63c4.125 0 8.33.571 12.213 1.63 9.302-6.356 13.427-5.052 13.427-5.052 2.67 6.763.97 11.816.485 13.038 3.155 3.422 5.015 7.822 5.015 13.2 0 18.905-11.404 23.06-22.324 24.283 1.78 1.548 3.316 4.481 3.316 9.126 0 6.6-.08 11.897-.08 13.526 0 1.304.89 2.853 3.316 2.364 19.412-6.52 33.405-24.935 33.405-46.691C97.707 22 75.788 0 48.854 0z">
            </path>
        </symbol>
    </svg>
    <header id="header">
        <div class="app-brand">
            <img src="https://avatars.githubusercontent.com/ShankarBUS" alt="ShankarBUS" class="profile-img">
            <h1>TN HMIS Wiki</h1>
        </div>
        <div class="button-group">
            <button id="homeButton" class="icon-button" title="Home">
                <svg class="icon">
                    <use xlink:href="#ic-home"></use>
                </svg>
            </button>
            <button id="ghRepoBtn" class="icon-button" title="GitHub Repository">
                <svg class="icon">
                    <use xlink:href="#ic-github"></use>
                </svg>
            </button>
            <button id="ghProfileBtn" class="icon-button" title="ShankarBUS">
                <img class="profile-img" src="https://avatars.githubusercontent.com/ShankarBUS" width="20px"
                    height="20px">
            </button>
        </div>
    </header>

    <div class="app-shell">
        <aside class="navbar group">
            <div class="nav-header">
                <h2>Pages</h2>
                <button id="navCloseBtn" class="modal-close" aria-label="Close navigation"></button>
            </div>
            <!-- <input id="searchInput" type="search" placeholder="Search pages or text..." autocomplete="off" /> -->
            <div id="pageList" class="nav-list"></div>
        </aside>

        <main>
            <section class="page-info group">
                <div id="breadCrumbBar" class="breadcrumb"></div>
                <h1 id="pageTitle">Loading wiki…</h1>
                <div id="pageDescription"></div>
                <div id="pageToc" class="wiki-toc group" aria-label="Table of contents"></div>
            </section>

            <article id="content" class="wiki-content group">
                <p>Loading content from the docs folder.</p>
            </article>
        </main>
    </div>

    <footer>
        <p>© ShankarBUS</p>
    </footer>

    <script type="module" src="script.js"></script>
</body>

</html>
